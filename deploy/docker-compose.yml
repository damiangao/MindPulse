services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: mindpulse-server
    ports:
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://api.minimax.io}
      - MODEL=${MODEL:-MiniMax-M2.7}
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - AGENT_PROJECT_ROOT=/app/workspaces
    volumes:
      - server-data:/app/data
      - server-workspaces:/app/workspaces
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    container_name: mindpulse-client
    ports:
      - "8080:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-data:
  server-workspaces:
