apiVersion: apps/v1
kind: Deployment
metadata:
  name: mindpulse-client
  namespace: mindpulse
  labels:
    app: mindpulse
    component: client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mindpulse
      component: client
  template:
    metadata:
      labels:
        app: mindpulse
        component: client
    spec:
      containers:
        - name: client
          image: mindpulse-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mindpulse-client
  namespace: mindpulse
  labels:
    app: mindpulse
    component: client
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: mindpulse
    component: client
