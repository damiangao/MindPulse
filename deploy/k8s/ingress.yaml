apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mindpulse-ingress
  namespace: mindpulse
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: "mindpulse-server"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: mindpulse.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: mindpulse-server
                port:
                  number: 3001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: mindpulse-server
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mindpulse-client
                port:
                  number: 80
  tls:
    - hosts:
        - mindpulse.example.com
      secretName: mindpulse-tls
